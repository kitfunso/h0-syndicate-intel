<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 880" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1c1a16"/>
    </marker>
    <marker id="arrc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7a2230"/>
    </marker>
  </defs>

  <rect width="1280" height="880" fill="#f3efe6"/>

  <!-- masthead -->
  <text x="48" y="56" font-size="30" font-weight="700" fill="#1c1a16" letter-spacing="-0.4">Ask the Market</text>
  <text x="48" y="80" font-size="15" font-style="italic" fill="#6b6557">Architecture: a research desk for the Lloyd's syndicate market. Every number cited to its source report page.</text>
  <line x1="48" y1="94" x2="1232" y2="94" stroke="#1c1a16" stroke-width="2"/>

  <!-- ===================== user ===================== -->
  <rect x="48" y="200" width="170" height="120" rx="6" fill="#fbf9f4" stroke="#1c1a16" stroke-width="1.5"/>
  <text x="133" y="240" font-size="16" font-weight="700" text-anchor="middle" fill="#1c1a16">Analyst</text>
  <text x="133" y="262" font-size="12.5" font-style="italic" text-anchor="middle" fill="#6b6557">capital allocator,</text>
  <text x="133" y="280" font-size="12.5" font-style="italic" text-anchor="middle" fill="#6b6557">members' agent, judge</text>

  <!-- ===================== vercel ===================== -->
  <rect x="290" y="130" width="400" height="430" rx="8" fill="none" stroke="#1c1a16" stroke-width="2"/>
  <rect x="290" y="130" width="400" height="40" rx="8" fill="#1c1a16"/>
  <text x="490" y="156" font-size="15" font-weight="700" text-anchor="middle" fill="#f3efe6">VERCEL · v0.app — Next.js 15 frontend</text>

  <rect x="310" y="190" width="360" height="92" rx="5" fill="#fbf9f4" stroke="#e2dac9"/>
  <text x="324" y="214" font-size="14" font-weight="700" fill="#1f3a5f">Discovery dashboard (server components)</text>
  <text x="324" y="234" font-size="12" fill="#3a3630" font-family="Consolas, monospace">buildDashboard() · market tiles · hero scatter</text>
  <text x="324" y="252" font-size="12" fill="#3a3630" font-family="Consolas, monospace">league + peek · GET /api/dashboard(/macro)</text>
  <text x="324" y="271" font-size="11.5" font-style="italic" fill="#6b6557">no LLM on this path: pure parameterized SQL</text>

  <rect x="310" y="298" width="360" height="138" rx="5" fill="#fbf9f4" stroke="#7a2230" stroke-width="1.5"/>
  <text x="324" y="322" font-size="14" font-weight="700" fill="#7a2230">Ask box — POST /api/ask (intent router)</text>
  <text x="324" y="343" font-size="12" fill="#3a3630">1. Claude emits {intent, params} — never SQL</text>
  <text x="324" y="362" font-size="12" fill="#3a3630">2. zod validator — allowlist of 8 intents</text>
  <text x="324" y="381" font-size="12" fill="#3a3630">3. fixed SQL template, bound params, read-only role</text>
  <text x="324" y="400" font-size="12" fill="#3a3630">4. composer: numbers from rows, citations from pages</text>
  <text x="324" y="421" font-size="11.5" font-style="italic" fill="#6b6557">off-catalog questions degrade gracefully</text>

  <rect x="310" y="452" width="360" height="88" rx="5" fill="#fbf9f4" stroke="#e2dac9"/>
  <text x="324" y="476" font-size="14" font-weight="700" fill="#b07d2b">Source-page viewer (the trust feature)</text>
  <text x="324" y="496" font-size="12" fill="#3a3630">click a cited figure: the actual report page</text>
  <text x="324" y="514" font-size="12" fill="#3a3630" font-family="Consolas, monospace">/sources/&lt;syn&gt;/p&lt;page&gt;.png — figure highlighted</text>

  <!-- ===================== aws ===================== -->
  <rect x="760" y="130" width="472" height="430" rx="8" fill="none" stroke="#1c1a16" stroke-width="2"/>
  <rect x="760" y="130" width="472" height="40" rx="8" fill="#1f3a5f"/>
  <text x="996" y="156" font-size="15" font-weight="700" text-anchor="middle" fill="#f3efe6">AWS</text>

  <rect x="780" y="190" width="432" height="210" rx="5" fill="#fbf9f4" stroke="#1f3a5f" stroke-width="1.5"/>
  <text x="794" y="214" font-size="14" font-weight="700" fill="#1f3a5f">Aurora PostgreSQL (Serverless v2) + pgvector</text>
  <text x="794" y="238" font-size="12" fill="#3a3630" font-family="Consolas, monospace">syndicate_year — native ccy + GBP figures,</text>
  <text x="794" y="255" font-size="12" fill="#3a3630" font-family="Consolas, monospace">  per-figure page provenance, verified flag</text>
  <text x="794" y="275" font-size="12" fill="#3a3630" font-family="Consolas, monospace">report_chunk — narrative · tsvector + HNSW(1024)</text>
  <text x="794" y="295" font-size="12" fill="#3a3630" font-family="Consolas, monospace">market_series — Lloyd's aggregates 2016-2024</text>
  <text x="794" y="315" font-size="12" fill="#3a3630" font-family="Consolas, monospace">fx_rate — GBP normalisation + currency toggle</text>
  <text x="794" y="342" font-size="11.5" font-style="italic" fill="#7a2230">defence in depth: app_readonly role · READ ONLY tx ·</text>
  <text x="794" y="359" font-size="11.5" font-style="italic" fill="#7a2230">statement_timeout · LIMIT caps · no raw identifiers</text>
  <text x="794" y="386" font-size="11.5" font-style="italic" fill="#6b6557">one database: relational facts + vector narrative, joined in SQL</text>

  <rect x="780" y="420" width="432" height="118" rx="5" fill="#fbf9f4" stroke="#e2dac9"/>
  <text x="794" y="444" font-size="14" font-weight="700" fill="#1f3a5f">Amazon Bedrock</text>
  <text x="794" y="466" font-size="12" fill="#3a3630" font-family="Consolas, monospace">Claude Sonnet 4.6 — intent routing + composing</text>
  <text x="794" y="486" font-size="12" fill="#3a3630" font-family="Consolas, monospace">Titan Text Embeddings v2 — 1024-dim vectors</text>
  <text x="794" y="510" font-size="11.5" font-style="italic" fill="#6b6557">via Vercel AI SDK (@ai-sdk/amazon-bedrock)</text>

  <!-- ===================== arrows (online) ===================== -->
  <line x1="218" y1="260" x2="286" y2="260" stroke="#1c1a16" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="252" y="248" font-size="11" text-anchor="middle" fill="#6b6557" font-family="Consolas, monospace">HTTPS</text>

  <line x1="670" y1="240" x2="776" y2="240" stroke="#1c1a16" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="723" y="228" font-size="11" text-anchor="middle" fill="#6b6557" font-family="Consolas, monospace">SQL · read-only</text>

  <line x1="670" y1="368" x2="776" y2="300" stroke="#1c1a16" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="734" y="324" font-size="11" text-anchor="middle" fill="#6b6557" font-family="Consolas, monospace">bound params</text>

  <line x1="670" y1="400" x2="776" y2="470" stroke="#7a2230" stroke-width="1.8" marker-end="url(#arrc)"/>
  <text x="734" y="452" font-size="11" text-anchor="middle" fill="#7a2230" font-family="Consolas, monospace">route + compose</text>

  <!-- ===================== offline pipeline ===================== -->
  <rect x="48" y="618" width="1184" height="190" rx="8" fill="none" stroke="#b07d2b" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="68" y="648" font-size="15" font-weight="700" fill="#b07d2b">Offline data pipeline — verification first</text>

  <rect x="68" y="668" width="196" height="98" rx="5" fill="#fbf9f4" stroke="#e2dac9"/>
  <text x="166" y="700" font-size="12.5" font-weight="700" text-anchor="middle" fill="#1c1a16">Lloyd's syndicate</text>
  <text x="166" y="718" font-size="12.5" font-weight="700" text-anchor="middle" fill="#1c1a16">annual report PDFs</text>
  <text x="166" y="740" font-size="11" font-style="italic" text-anchor="middle" fill="#6b6557">the ground truth</text>

  <rect x="296" y="668" width="180" height="98" rx="5" fill="#fbf9f4" stroke="#e2dac9"/>
  <text x="386" y="700" font-size="12.5" font-weight="700" text-anchor="middle" fill="#1c1a16">Figure extraction</text>
  <text x="386" y="722" font-size="11" font-style="italic" text-anchor="middle" fill="#6b6557">combined ratio, GWP,</text>
  <text x="386" y="738" font-size="11" font-style="italic" text-anchor="middle" fill="#6b6557">NEP per syndicate-year</text>

  <rect x="508" y="668" width="240" height="98" rx="5" fill="#fbf9f4" stroke="#7a2230" stroke-width="1.5"/>
  <text x="628" y="696" font-size="12.5" font-weight="700" text-anchor="middle" fill="#7a2230">Figure-checker verification</text>
  <text x="628" y="716" font-size="11" font-style="italic" text-anchor="middle" fill="#6b6557">every figure reconciled vs the PDF:</text>
  <text x="628" y="732" font-size="11" font-style="italic" text-anchor="middle" fill="#6b6557">match + page + verbatim quote</text>
  <text x="628" y="752" font-size="11" font-family="Consolas, monospace" text-anchor="middle" fill="#3a3630">sets the verified flag</text>

  <rect x="780" y="668" width="200" height="98" rx="5" fill="#fbf9f4" stroke="#e2dac9"/>
  <text x="880" y="700" font-size="12.5" font-weight="700" text-anchor="middle" fill="#1c1a16">Seed</text>
  <text x="880" y="720" font-size="11" font-style="italic" text-anchor="middle" fill="#6b6557">native ccy + GBP-normalised,</text>
  <text x="880" y="736" font-size="11" font-style="italic" text-anchor="middle" fill="#6b6557">fx rates, narrative chunks</text>

  <rect x="1012" y="668" width="200" height="98" rx="5" fill="#fbf9f4" stroke="#e2dac9"/>
  <text x="1112" y="700" font-size="12.5" font-weight="700" text-anchor="middle" fill="#1c1a16">Page renders</text>
  <text x="1112" y="720" font-size="11" font-style="italic" text-anchor="middle" fill="#6b6557">cited pages to PNG,</text>
  <text x="1112" y="736" font-size="11" font-style="italic" text-anchor="middle" fill="#6b6557">figure highlighted in gold</text>

  <line x1="264" y1="717" x2="292" y2="717" stroke="#1c1a16" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="476" y1="717" x2="504" y2="717" stroke="#1c1a16" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="748" y1="717" x2="776" y2="717" stroke="#1c1a16" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="980" y1="717" x2="1008" y2="717" stroke="#1c1a16" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- pipeline feeds aurora + static assets -->
  <line x1="880" y1="664" x2="940" y2="564" stroke="#1f3a5f" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="950" y="600" font-size="11" fill="#1f3a5f" font-family="Consolas, monospace">migrate + seed</text>
  <line x1="1112" y1="664" x2="640" y2="544" stroke="#b07d2b" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="730" y="586" font-size="11" fill="#b07d2b" font-family="Consolas, monospace">public/sources/*.png</text>

  <!-- footer -->
  <line x1="48" y1="836" x2="1232" y2="836" stroke="#e2dac9" stroke-width="1"/>
  <text x="640" y="858" font-size="12" font-family="Consolas, monospace" text-anchor="middle" fill="#6b6557">H0 Hackathon · AWS database (Aurora PostgreSQL + pgvector) · Vercel/v0.app frontend · Bedrock for language, never for arithmetic</text>
</svg>
