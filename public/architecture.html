<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Ask the Market - architecture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f6f7f9; }
  #cap { width: 2720px; height: 1920px; }
  .s { font-family: "Plus Jakarta Sans", system-ui, sans-serif; }
  .m { font-family: "JetBrains Mono", ui-monospace, Consolas, monospace; }
</style>
</head>
<body>
<div id="cap">
<svg width="2720" height="1920" viewBox="0 0 1360 960" xmlns="http://www.w3.org/2000/svg" class="s">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
    </marker>
    <marker id="ab" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="am" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#b45309"/>
    </marker>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1360" height="960" fill="#f6f7f9"/>

  <!-- header -->
  <rect x="40" y="34" width="9" height="30" rx="2" fill="#2563eb"/>
  <text x="62" y="58" font-size="30" font-weight="800" fill="#0f172a" letter-spacing="-0.6">Ask the Market</text>
  <text x="62" y="84" font-size="15" fill="#5b6675">A research desk for the Lloyd&#39;s of London syndicate market. Plain-English questions, answered from the filings, cited to the page.</text>
  <text x="1320" y="50" font-size="12" text-anchor="end" class="m" fill="#2563eb" font-weight="600">Aurora &#183; live</text>
  <text x="1320" y="70" font-size="11.5" text-anchor="end" class="m" fill="#5b6675">h0-syndicate-intel.vercel.app</text>
  <line x1="40" y1="104" x2="1320" y2="104" stroke="#e7eaee" stroke-width="2"/>

  <!-- user -->
  <rect x="40" y="232" width="156" height="118" rx="12" fill="#ffffff" stroke="#e7eaee" filter="url(#sh)"/>
  <text x="118" y="270" font-size="16" font-weight="700" text-anchor="middle" fill="#0f172a">Analyst</text>
  <text x="118" y="292" font-size="12" text-anchor="middle" fill="#5b6675">capital allocator,</text>
  <text x="118" y="309" font-size="12" text-anchor="middle" fill="#5b6675">underwriter,</text>
  <text x="118" y="326" font-size="12" text-anchor="middle" fill="#5b6675">members&#39; agent</text>

  <line x1="196" y1="291" x2="252" y2="291" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
  <text x="224" y="281" font-size="10.5" text-anchor="middle" class="m" fill="#5b6675">HTTPS</text>

  <!-- VERCEL -->
  <rect x="256" y="140" width="468" height="500" rx="14" fill="#ffffff" stroke="#e7eaee" filter="url(#sh)"/>
  <rect x="256" y="140" width="468" height="42" rx="14" fill="#0f172a"/>
  <rect x="256" y="166" width="468" height="16" fill="#0f172a"/>
  <text x="276" y="167" font-size="14" font-weight="700" fill="#ffffff">VERCEL</text>
  <text x="704" y="167" font-size="12.5" text-anchor="end" class="m" fill="#cbd5e1">Next.js 15 &#183; React 19 &#183; TypeScript</text>

  <!-- three surfaces -->
  <rect x="276" y="200" width="428" height="86" rx="9" fill="#f8fafc" stroke="#e7eaee"/>
  <text x="292" y="224" font-size="13.5" font-weight="700" fill="#2563eb">Three surfaces (server components)</text>
  <text x="292" y="244" font-size="11.5" fill="#334155"><tspan font-weight="700">Research desk</tspan> /  -  25 cited syndicates, click-to-source</text>
  <text x="292" y="262" font-size="11.5" fill="#334155"><tspan font-weight="700">Syndicate universe</tspan> /syndicates  -  132, 2020-2025</text>
  <text x="292" y="280" font-size="11.5" fill="#334155"><tspan font-weight="700">Market in charts</tspan> /market  -  interactive aggregates</text>

  <!-- ask pipeline -->
  <rect x="276" y="298" width="428" height="190" rx="9" fill="#eff4ff" stroke="#2563eb" stroke-width="1.4"/>
  <text x="292" y="322" font-size="13.5" font-weight="700" fill="#1d4ed8">Ask box  -  POST /api/ask  (the safety pipeline)</text>
  <text x="292" y="345" font-size="11.5" fill="#1e293b"><tspan class="m" font-weight="600" fill="#1d4ed8">1</tspan>  Claude routes the question to {intent, params}  -  never SQL</text>
  <text x="292" y="366" font-size="11.5" fill="#1e293b"><tspan class="m" font-weight="600" fill="#1d4ed8">2</tspan>  zod validator  -  allowlist of 8 query intents</text>
  <text x="292" y="387" font-size="11.5" fill="#1e293b"><tspan class="m" font-weight="600" fill="#1d4ed8">3</tspan>  fixed parameterized SQL  -  read-only role, scope cited|all</text>
  <text x="292" y="408" font-size="11.5" fill="#1e293b"><tspan class="m" font-weight="600" fill="#1d4ed8">4</tspan>  composer  -  numbers from rows, citations from pages</text>
  <line x1="292" y1="423" x2="688" y2="423" stroke="#c7d6f5"/>
  <text x="292" y="443" font-size="11" fill="#5b6675">per-IP rate limit &#183; non-string degrades, never 500</text>
  <text x="292" y="462" font-size="11" font-style="italic" fill="#5b6675">off-catalog or zero-row questions degrade gracefully</text>
  <text x="292" y="480" font-size="11" font-style="italic" fill="#5b6675">with recovery suggestions, never an invented figure</text>

  <!-- source viewer -->
  <rect x="276" y="500" width="428" height="124" rx="9" fill="#f8fafc" stroke="#e7eaee"/>
  <text x="292" y="524" font-size="13.5" font-weight="700" fill="#b45309">Source-page viewer  -  the trust feature</text>
  <text x="292" y="546" font-size="11.5" fill="#334155">click a cited figure and the actual report page opens,</text>
  <text x="292" y="564" font-size="11.5" fill="#334155">with the number highlighted  -  don&#39;t trust me, check.</text>
  <text x="292" y="586" font-size="11" class="m" fill="#5b6675">/sources/&lt;syn&gt;/p&lt;page&gt;.png</text>
  <text x="292" y="608" font-size="11" font-style="italic" fill="#5b6675">interactive SVG charts on every dashboard + profile</text>

  <!-- AWS -->
  <rect x="784" y="140" width="536" height="500" rx="14" fill="#ffffff" stroke="#e7eaee" filter="url(#sh)"/>
  <rect x="784" y="140" width="536" height="42" rx="14" fill="#232f3e"/>
  <rect x="784" y="166" width="536" height="16" fill="#232f3e"/>
  <text x="804" y="167" font-size="14" font-weight="700" fill="#ff9900">AWS</text>
  <text x="1300" y="167" font-size="12" text-anchor="end" class="m" fill="#cbd5e1">us-east-1 &#183; one DB, two jobs</text>

  <!-- aurora -->
  <rect x="804" y="200" width="496" height="248" rx="9" fill="#f8fafc" stroke="#2563eb" stroke-width="1.3"/>
  <text x="820" y="224" font-size="14" font-weight="700" fill="#1d4ed8">Amazon Aurora PostgreSQL (Serverless v2) + pgvector</text>
  <text x="820" y="248" font-size="11.5" class="m" fill="#334155">syndicate_year     25 cited &#183; native+GBP &#183; page provenance</text>
  <text x="820" y="267" font-size="11.5" class="m" fill="#334155">syndicate_summary  132 syndicates &#215; 2020-2025  (breadth)</text>
  <text x="820" y="286" font-size="11.5" class="m" fill="#1d4ed8" font-weight="600">v_syndicate_metric  unified view  -  depth &#8746; breadth</text>
  <text x="820" y="305" font-size="11.5" class="m" fill="#334155">report_chunk       narrative &#183; tsvector + HNSW(1024)</text>
  <text x="820" y="324" font-size="11.5" class="m" fill="#334155">market_series      Lloyd&#39;s aggregates 2016-2024</text>
  <text x="820" y="343" font-size="11.5" class="m" fill="#334155">fx_rate            GBP normalisation</text>
  <line x1="820" y1="358" x2="1284" y2="358" stroke="#e2e8f0"/>
  <text x="820" y="378" font-size="11" font-style="italic" fill="#b45309">defence in depth: app_readonly role &#183; BEGIN READ ONLY tx &#183;</text>
  <text x="820" y="395" font-size="11" font-style="italic" fill="#b45309">statement_timeout &#183; LIMIT caps &#183; no raw identifiers from the model</text>
  <text x="820" y="420" font-size="11.5" fill="#1e293b">relational facts for rankings <tspan font-weight="700">+</tspan> vector search for narrative,</text>
  <text x="820" y="438" font-size="11.5" fill="#1e293b">joined in a single SQL query.</text>

  <!-- bedrock -->
  <rect x="804" y="464" width="496" height="156" rx="9" fill="#f8fafc" stroke="#e7eaee"/>
  <text x="820" y="488" font-size="14" font-weight="700" fill="#1d4ed8">Amazon Bedrock</text>
  <text x="820" y="512" font-size="11.5" class="m" fill="#334155">Claude Sonnet 4.6      intent routing + answer composing</text>
  <text x="820" y="531" font-size="11.5" class="m" fill="#334155">Titan Text Embeddings  1024-dim narrative vectors</text>
  <text x="820" y="556" font-size="11.5" fill="#1e293b">the model routes and composes  -  it never does the arithmetic</text>
  <text x="820" y="578" font-size="11" font-style="italic" fill="#5b6675">via the Vercel AI SDK (@ai-sdk/amazon-bedrock)</text>
  <text x="820" y="600" font-size="11" font-style="italic" fill="#5b6675">a figure cannot be hallucinated: numbers come from fact rows</text>

  <!-- arrows vercel <-> aws -->
  <line x1="724" y1="250" x2="780" y2="250" stroke="#2563eb" stroke-width="1.8" marker-end="url(#ab)"/>
  <text x="752" y="240" font-size="10.5" text-anchor="middle" class="m" fill="#2563eb">read-only SQL</text>
  <line x1="724" y1="392" x2="780" y2="320" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
  <text x="756" y="345" font-size="10.5" text-anchor="middle" class="m" fill="#5b6675">bound params</text>
  <line x1="724" y1="430" x2="800" y2="500" stroke="#b45309" stroke-width="1.8" marker-end="url(#am)"/>
  <text x="760" y="486" font-size="10.5" text-anchor="middle" class="m" fill="#b45309">route + compose</text>

  <!-- offline pipeline -->
  <rect x="40" y="678" width="1280" height="206" rx="14" fill="#fffbf5" stroke="#b45309" stroke-width="1.6" stroke-dasharray="7 5"/>
  <text x="62" y="708" font-size="15" font-weight="700" fill="#b45309">Offline data pipeline  -  verification first</text>

  <rect x="62" y="724" width="210" height="118" rx="10" fill="#ffffff" stroke="#e7eaee"/>
  <text x="167" y="760" font-size="12.5" font-weight="700" text-anchor="middle" fill="#0f172a">Annual-report PDFs</text>
  <text x="167" y="782" font-size="11" text-anchor="middle" fill="#5b6675">132 Lloyd&#39;s syndicates,</text>
  <text x="167" y="799" font-size="11" text-anchor="middle" fill="#5b6675">50-200 pages each</text>
  <text x="167" y="821" font-size="10.5" font-style="italic" text-anchor="middle" fill="#b45309">the ground truth</text>

  <rect x="312" y="724" width="206" height="118" rx="10" fill="#ffffff" stroke="#e7eaee"/>
  <text x="415" y="760" font-size="12.5" font-weight="700" text-anchor="middle" fill="#0f172a">Figure extraction</text>
  <text x="415" y="782" font-size="11" text-anchor="middle" fill="#5b6675">combined ratio, GWP, NEP,</text>
  <text x="415" y="799" font-size="11" text-anchor="middle" fill="#5b6675">assets, by syndicate-year</text>
  <text x="415" y="821" font-size="10.5" font-style="italic" text-anchor="middle" fill="#5b6675">native currency, as filed</text>

  <rect x="558" y="724" width="244" height="118" rx="10" fill="#ffffff" stroke="#b45309" stroke-width="1.3"/>
  <text x="680" y="756" font-size="12.5" font-weight="700" text-anchor="middle" fill="#b45309">Figure-checker</text>
  <text x="680" y="777" font-size="11" text-anchor="middle" fill="#5b6675">25 syndicates reconciled vs PDF:</text>
  <text x="680" y="794" font-size="11" text-anchor="middle" fill="#5b6675">match + page + verbatim quote</text>
  <text x="680" y="822" font-size="10.5" class="m" text-anchor="middle" fill="#334155">sets the verified flag</text>

  <rect x="842" y="724" width="214" height="118" rx="10" fill="#ffffff" stroke="#e7eaee"/>
  <text x="949" y="760" font-size="12.5" font-weight="700" text-anchor="middle" fill="#0f172a">Seed</text>
  <text x="949" y="782" font-size="11" text-anchor="middle" fill="#5b6675">native + GBP-normalised,</text>
  <text x="949" y="799" font-size="11" text-anchor="middle" fill="#5b6675">fx rates, narrative chunks,</text>
  <text x="949" y="816" font-size="11" text-anchor="middle" fill="#5b6675">embeddings</text>

  <rect x="1096" y="724" width="200" height="118" rx="10" fill="#ffffff" stroke="#e7eaee"/>
  <text x="1196" y="760" font-size="12.5" font-weight="700" text-anchor="middle" fill="#0f172a">Page renders</text>
  <text x="1196" y="782" font-size="11" text-anchor="middle" fill="#5b6675">cited pages to PNG,</text>
  <text x="1196" y="799" font-size="11" text-anchor="middle" fill="#5b6675">the figure highlighted</text>
  <text x="1196" y="821" font-size="10.5" font-style="italic" text-anchor="middle" fill="#5b6675">the click-to-source asset</text>

  <line x1="272" y1="783" x2="308" y2="783" stroke="#475569" stroke-width="1.6" marker-end="url(#a)"/>
  <line x1="518" y1="783" x2="554" y2="783" stroke="#475569" stroke-width="1.6" marker-end="url(#a)"/>
  <line x1="802" y1="783" x2="838" y2="783" stroke="#475569" stroke-width="1.6" marker-end="url(#a)"/>
  <line x1="1056" y1="783" x2="1092" y2="783" stroke="#475569" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- pipeline -> aurora + static -->
  <line x1="949" y1="722" x2="1010" y2="624" stroke="#2563eb" stroke-width="1.8" marker-end="url(#ab)"/>
  <text x="1006" y="660" font-size="10.5" class="m" fill="#2563eb">migrate + seed</text>
  <line x1="1196" y1="722" x2="610" y2="626" stroke="#b45309" stroke-width="1.6" marker-end="url(#am)"/>
  <text x="900" y="690" font-size="10.5" class="m" fill="#b45309">public/sources/*.png</text>

  <!-- footer -->
  <line x1="40" y1="908" x2="1320" y2="908" stroke="#e7eaee"/>
  <text x="680" y="934" font-size="12" class="m" text-anchor="middle" fill="#5b6675">H0 Hackathon  &#183;  Amazon Aurora PostgreSQL + pgvector  &#183;  AWS Bedrock  &#183;  Next.js on Vercel  &#183;  the model routes and composes, never does arithmetic</text>
</svg>
</div>
</body>
</html>
